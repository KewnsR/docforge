services:
  db:
    image: postgres:15-alpine
    container_name: dokari_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dokari
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - dokari_net

  php-backend:
    build:
      context: ./php-backend
      dockerfile: Dockerfile
    container_name: dokari_php
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: dokari
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./php-backend:/var/www/html
    depends_on:
      - db
    networks:
      - dokari_net

  flask-ai:
    build:
      context: ./flask-ai
      dockerfile: Dockerfile
    container_name: dokari_flask
    ports:
      - "5000:5000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DB_HOST: db
      DB_NAME: dokari
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./flask-ai:/app
    depends_on:
      - db
    networks:
      - dokari_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dokari_nginx
    ports:
      - "3000:80"
    networks:
      - dokari_net

volumes:
  pgdata:

networks:
  dokari_net:
    driver: bridge
